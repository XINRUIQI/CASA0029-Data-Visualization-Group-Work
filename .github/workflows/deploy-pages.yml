# 推送至默认分支时自动构建 viz/ 并发布到 GitHub Pages（与本地 npm run deploy 二选一即可）
# 使用前请在仓库 Settings → Pages → Build and deployment → Source 选择「GitHub Actions」

name: Deploy GitHub Pages

on:
  push:
    branches:
      - Test
      - QXR
      - DZX
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: viz/package-lock.json

      - name: Install & build
        working-directory: viz
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
